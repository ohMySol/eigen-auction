[profile.default]
src = "src"
out = "out"
libs = ["lib"]

auto_detect_solc = true
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false

ignored_error_codes = [5667, 2072, 6321] # unused-param, unused-local-var, unnamed-return-variable

# Deploy/DeployTestnet read config/networks and write deployments at the repo root (two levels up).
fs_permissions = [
    { access = "read", path = "../../config" },
    { access = "read-write", path = "../../deployments" },
]

[rpc_endpoints]